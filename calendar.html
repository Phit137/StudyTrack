<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar — StudyTrack</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Header / Navbar -->
  <header class="navbar">
    <a href="index.html" class="navbar-logo">
      <span class="logo-icon">&#9998;</span>
      <span class="logo-text">StudyTrack</span>
    </a>
    <nav class="navbar-links" id="navLinks">
      <a href="index.html">Dashboard</a>
      <a href="assignments.html">Assignments</a>
      <a href="calendar.html" class="nav-active">Calendar</a>
    </nav>
    <div class="navbar-right">
      <span class="nav-user" id="navUser"></span>
      <button class="btn-logout" id="logoutBtn">Log Out</button>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header-inner">
      <div>
        <h1 class="page-title">Calendar View</h1>
        <p class="page-subtitle">A visual overview of all your upcoming due dates.</p>
      </div>
      <a href="assignments.html" class="btn-secondary">Manage Assignments</a>
    </div>
  </div>

  <!-- Calendar -->
  <main class="calendar-main">
    <div class="calendar-container">
      <div class="calendar-nav">
        <button class="cal-nav-btn" id="prevMonth">&#8249;</button>
        <h2 class="cal-month-label" id="monthLabel"></h2>
        <button class="cal-nav-btn" id="nextMonth">&#8250;</button>
      </div>
      <div class="cal-weekdays">
        <div>Sun</div><div>Mon</div><div>Tue</div>
        <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </main>

  <!-- Day Modal: all assignments for a clicked day -->
  <div class="modal-overlay hidden" id="calDayOverlay">
    <div class="modal cal-day-modal">
      <div class="modal-header">
        <h2 id="calDayTitle"></h2>
        <button class="modal-close" id="closeCalDayModal">&times;</button>
      </div>
      <div id="calDayList"></div>
    </div>
  </div>

  <!-- Edit Modal: edit a single assignment -->
  <div class="modal-overlay hidden" id="calEditOverlay">
    <div class="modal cal-detail-modal">
      <div class="modal-header">
        <h2>Edit Assignment</h2>
        <button class="modal-close" id="closeCalEditOverlay">&times;</button>
      </div>
      <form id="calEditForm">
        <div class="inline-fields">
          <div class="form-group fg-full">
            <label for="editInputTitle">Assignment Title</label>
            <input type="text" id="editInputTitle" required />
          </div>
          <div class="form-group">
            <label for="editInputCourse">Course</label>
            <input type="text" id="editInputCourse" required />
          </div>
          <div class="form-group">
            <label for="editInputDue">Due Date</label>
            <input type="date" id="editInputDue" required />
          </div>
          <div class="form-group fg-full">
            <label for="editInputNotes">Notes <span class="optional">(optional)</span></label>
            <textarea id="editInputNotes" rows="2"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-ghost" id="cancelCalEdit">Cancel</button>
          <button type="submit" class="btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <span class="logo-text footer-logo">StudyTrack</span>
    <p>&copy; 2026 StudyTrack. Built for students, by students.</p>
  </footer>

  <script type="module" src="calendar.js"></script>

</body>
</html>
