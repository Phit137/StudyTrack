<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar — StudyTrack</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Header / Navbar -->
  <header class="navbar">
    <a href="index.html" class="navbar-logo">
      <span class="logo-icon">&#9998;</span>
      <span class="logo-text">StudyTrack</span>
    </a>
    <nav class="navbar-links" id="navLinks">
      <a href="index.html">Dashboard</a>
      <a href="assignments.html">Assignments</a>
      <a href="calendar.html" class="nav-active">Calendar</a>
    </nav>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header-inner">
      <div>
        <h1 class="page-title">Calendar View</h1>
        <p class="page-subtitle">A visual overview of all your upcoming due dates.</p>
      </div>
      <a href="assignments.html" class="btn-secondary">Manage Assignments</a>
    </div>
  </div>

  <!-- Calendar -->
  <main class="calendar-main">
    <div class="calendar-container">
      <div class="calendar-nav">
        <button class="cal-nav-btn" id="prevMonth">&#8249;</button>
        <h2 class="cal-month-label" id="monthLabel"></h2>
        <button class="cal-nav-btn" id="nextMonth">&#8250;</button>
      </div>
      <div class="cal-weekdays">
        <div>Sun</div><div>Mon</div><div>Tue</div>
        <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </main>

  <!-- Day Modal: all assignments for a clicked day -->
  <div class="modal-overlay hidden" id="calDayOverlay">
    <div class="modal cal-day-modal">
      <div class="modal-header">
        <h2 id="calDayTitle"></h2>
        <button class="modal-close" id="closeCalDayModal">&times;</button>
      </div>
      <div id="calDayList"></div>
    </div>
  </div>

  <!-- Edit Modal: edit a single assignment -->
  <div class="modal-overlay hidden" id="calEditOverlay">
    <div class="modal cal-detail-modal">
      <div class="modal-header">
        <h2>Edit Assignment</h2>
        <button class="modal-close" id="closeCalEditOverlay">&times;</button>
      </div>
      <form id="calEditForm">
        <div class="inline-fields">
          <div class="form-group fg-full">
            <label for="editInputTitle">Assignment Title</label>
            <input type="text" id="editInputTitle" required />
          </div>
          <div class="form-group">
            <label for="editInputCourse">Course</label>
            <input type="text" id="editInputCourse" required />
          </div>
          <div class="form-group">
            <label for="editInputDue">Due Date</label>
            <input type="date" id="editInputDue" required />
          </div>
          <div class="form-group fg-full">
            <label for="editInputNotes">Notes <span class="optional">(optional)</span></label>
            <textarea id="editInputNotes" rows="2"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-ghost" id="cancelCalEdit">Cancel</button>
          <button type="submit" class="btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <span class="logo-text footer-logo">StudyTrack</span>
    <p>&copy; 2026 StudyTrack. Built for students, by students.</p>
  </footer>

  <script>
    const STORAGE_KEY = 'studytrack_assignments';
    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];

    function getAssignments() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function saveAssignments(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const [y, m, d] = dateStr.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatDateLong(dateStr) {
      if (!dateStr) return '';
      const [y, m, d] = dateStr.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    function getStatusBadge(dateStr, completed) {
      if (completed) return { label: '&#10003; Complete', cls: 'done-badge' };
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const [y, m, d] = dateStr.split('-').map(Number);
      const due  = new Date(y, m - 1, d);
      const diff = Math.ceil((due - today) / 86400000);
      if (diff < 0)   return { label: 'Overdue',   cls: 'urgent-badge' };
      if (diff === 0) return { label: 'Due Today', cls: 'urgent-badge' };
      if (diff <= 3)  return { label: 'Due Soon',  cls: 'urgent-badge' };
      if (diff <= 7)  return { label: 'This Week', cls: 'soon-badge'   };
      return               { label: 'Upcoming',    cls: 'ok-badge'     };
    }

    function getChipClass(dueDate, completed) {
      if (completed) return 'chip-done';
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const [y, m, d] = dueDate.split('-').map(Number);
      const due  = new Date(y, m - 1, d);
      const diff = Math.ceil((due - today) / 86400000);
      if (diff < 0)  return 'chip-overdue';
      if (diff <= 3) return 'chip-urgent';
      if (diff <= 7) return 'chip-soon';
      return 'chip-ok';
    }

    let viewYear      = new Date().getFullYear();
    let viewMonth     = new Date().getMonth();
    let selectedDayDate = null;   // date string of the open day modal
    let editingId       = null;   // id of assignment being edited

    // ── Calendar Rendering ───────────────────────────────────
    function renderCalendar() {
      const assignments = getAssignments();
      document.getElementById('monthLabel').textContent = `${MONTHS[viewMonth]} ${viewYear}`;

      const grid        = document.getElementById('calGrid');
      grid.innerHTML    = '';

      const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const today       = new Date();

      const assignMap = {};
      assignments.forEach(a => {
        if (!a || !a.dueDate) return;
        if (!assignMap[a.dueDate]) assignMap[a.dueDate] = [];
        assignMap[a.dueDate].push(a);
      });

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'cal-day empty';
        grid.appendChild(empty);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement('div');
        cell.className = 'cal-day';

        const mm      = String(viewMonth + 1).padStart(2, '0');
        const dd      = String(day).padStart(2, '0');
        const dateStr = `${viewYear}-${mm}-${dd}`;

        const isToday = today.getFullYear() === viewYear &&
                        today.getMonth()    === viewMonth &&
                        today.getDate()     === day;
        if (isToday) cell.classList.add('today');

        const dayItems = assignMap[dateStr] || [];

        // Day number
        const numEl = document.createElement('div');
        numEl.className = 'cal-day-num' + (isToday ? ' today-num' : '');
        numEl.textContent = day;
        cell.appendChild(numEl);

        // Chips (max 3 shown)
        const MAX_SHOWN = 3;
        dayItems.slice(0, MAX_SHOWN).forEach(a => {
          const chip = document.createElement('div');
          chip.className   = `cal-chip ${getChipClass(a.dueDate, a.completed)}`;
          chip.textContent = `${a.course} · ${a.title}`;
          chip.title       = `${a.course}: ${a.title}`;
          cell.appendChild(chip);
        });

        // "+N more" or overflow indicator
        const extra = dayItems.length - MAX_SHOWN;
        if (extra > 0) {
          const more = document.createElement('div');
          more.className   = 'cal-more';
          more.textContent = `+${extra} more`;
          cell.appendChild(more);
        }

        // Clicking anywhere on a day with assignments opens the day modal
        if (dayItems.length > 0) {
          cell.classList.add('cal-day-has-items');
          cell.addEventListener('click', () => openDayModal(dateStr));
        }

        grid.appendChild(cell);
      }
    }

    // ── Day Modal ────────────────────────────────────────────
    function openDayModal(dateStr) {
      selectedDayDate = dateStr;
      renderDayModal();
      document.getElementById('calDayOverlay').classList.remove('hidden');
    }

    function closeDayModal() {
      document.getElementById('calDayOverlay').classList.add('hidden');
      selectedDayDate = null;
    }

    function renderDayModal() {
      const dayAssignments = getAssignments().filter(a => a.dueDate === selectedDayDate);

      document.getElementById('calDayTitle').textContent =
        `Assignments — ${formatDateLong(selectedDayDate)}`;

      const list = document.getElementById('calDayList');

      if (dayAssignments.length === 0) {
        list.innerHTML = `
          <div class="empty-state" style="padding:2rem 1rem;">
            <div class="empty-icon">&#128203;</div>
            <h3>No assignments</h3>
            <p>Nothing due on this day.</p>
          </div>`;
        return;
      }

      list.innerHTML = dayAssignments.map(a => {
        const badge = getStatusBadge(a.dueDate, a.completed);
        return `
          <div class="day-modal-row ${a.completed ? 'row-done' : ''}">
            <div class="day-modal-info">
              <div class="day-modal-title-row">
                <span class="row-title">${a.title}</span>
                <span class="uc-badge ${badge.cls}">${badge.label}</span>
              </div>
              <div class="day-modal-meta">
                <span class="row-course">${a.course}</span>
                <span class="row-date">&#128197; ${formatDate(a.dueDate)}</span>
                ${a.notes ? `<span class="row-notes">${a.notes}</span>` : ''}
              </div>
            </div>
            <div class="row-actions">
              <button class="btn-icon btn-complete ${a.completed ? 'completed' : ''}"
                      data-id="${a.id}" title="${a.completed ? 'Mark incomplete' : 'Mark complete'}">&#10003;</button>
              <button class="btn-icon btn-day-edit"   data-id="${a.id}" title="Edit">&#9998;</button>
              <button class="btn-icon btn-day-delete" data-id="${a.id}" title="Delete">&#128465;</button>
            </div>
          </div>`;
      }).join('');

      // Complete toggle
      list.querySelectorAll('.btn-complete').forEach(btn =>
        btn.addEventListener('click', () => {
          const data = getAssignments();
          const a = data.find(x => x.id === btn.dataset.id);
          if (!a) return;
          a.completed = !a.completed;
          saveAssignments(data);
          renderDayModal();
          renderCalendar();
        }));

      // Edit
      list.querySelectorAll('.btn-day-edit').forEach(btn =>
        btn.addEventListener('click', () => openEditModal(btn.dataset.id)));

      // Delete
      list.querySelectorAll('.btn-day-delete').forEach(btn =>
        btn.addEventListener('click', () => {
          if (!confirm('Delete this assignment?')) return;
          saveAssignments(getAssignments().filter(x => x.id !== btn.dataset.id));
          renderCalendar();
          // If no assignments remain for this day, close the modal
          const remaining = getAssignments().filter(a => a.dueDate === selectedDayDate);
          if (remaining.length === 0) {
            closeDayModal();
          } else {
            renderDayModal();
          }
        }));
    }

    // ── Edit Modal ───────────────────────────────────────────
    function openEditModal(id) {
      editingId = id;
      const a = getAssignments().find(x => x.id === id);
      if (!a) return;
      document.getElementById('editInputTitle').value  = a.title;
      document.getElementById('editInputCourse').value = a.course;
      document.getElementById('editInputDue').value    = a.dueDate;
      document.getElementById('editInputNotes').value  = a.notes || '';
      // Hide day modal while editing, keep selectedDayDate so we can return
      document.getElementById('calDayOverlay').classList.add('hidden');
      document.getElementById('calEditOverlay').classList.remove('hidden');
    }

    function closeEditModal(returnToDay) {
      document.getElementById('calEditOverlay').classList.add('hidden');
      editingId = null;
      if (returnToDay && selectedDayDate) {
        renderDayModal();
        document.getElementById('calDayOverlay').classList.remove('hidden');
      }
    }

    document.getElementById('calEditForm').addEventListener('submit', e => {
      e.preventDefault();
      const data = getAssignments();
      const a = data.find(x => x.id === editingId);
      if (a) {
        a.title   = document.getElementById('editInputTitle').value.trim();
        a.course  = document.getElementById('editInputCourse').value.trim();
        a.dueDate = document.getElementById('editInputDue').value;
        a.notes   = document.getElementById('editInputNotes').value.trim();
        saveAssignments(data);
      }
      renderCalendar();
      closeEditModal(true);
    });

    document.getElementById('cancelCalEdit').addEventListener('click',       () => closeEditModal(true));
    document.getElementById('closeCalEditOverlay').addEventListener('click', () => closeEditModal(true));
    document.getElementById('calEditOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('calEditOverlay')) closeEditModal(true);
    });

    // ── Day Modal close ──────────────────────────────────────
    document.getElementById('closeCalDayModal').addEventListener('click', closeDayModal);
    document.getElementById('calDayOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('calDayOverlay')) closeDayModal();
    });

    // ── Month navigation ─────────────────────────────────────
    document.getElementById('prevMonth').addEventListener('click', () => {
      viewMonth--;
      if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      viewMonth++;
      if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      renderCalendar();
    });

    // Re-render if assignments change in another tab
    window.addEventListener('storage', e => {
      if (e.key === STORAGE_KEY) renderCalendar();
    });

    renderCalendar();

    // ── Hamburger Menu ───────────────────────────────────────
    const hamburger = document.getElementById('hamburger');
    const navLinks  = document.getElementById('navLinks');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      navLinks.classList.toggle('open');
    });
    document.addEventListener('click', e => {
      if (!hamburger.contains(e.target) && !navLinks.contains(e.target)) {
        hamburger.classList.remove('open');
        navLinks.classList.remove('open');
      }
    });
  </script>

</body>
</html>
